<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Durotimi Ogunbameru — Portfolio</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      color: #e2e8f0;
      text-align: center;
      padding: 2rem;
    }
    .card {
      max-width: 640px;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 1rem;
    }
    p { font-size: 1.125rem; line-height: 1.6; color: #94a3b8; margin-bottom: 2rem; }
    .links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: 600;
      background: #38bdf8;
      color: #0f172a;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    a.secondary { background: transparent; color: #38bdf8; border: 1px solid #38bdf8; }
    a:hover { transform: translateY(-2px); opacity: 0.9; }
    footer { margin-top: 3rem; font-size: 0.875rem; color: #64748b; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Durotimi Ogunbameru</h1>
    <p>Welcome to my portfolio. This site is under construction — check back soon for projects, work, and more.</p>
    <div class="links">
      <a href="https://github.com/durotimiogunbameru-hue">GitHub</a>
      <a class="secondary" href="mailto:ologunba@ttu.edu">Contact</a>
    </div>
    <footer>&copy; 2026 Durotimi Ogunbameru</footer>
  </main>
</body>
</html>
